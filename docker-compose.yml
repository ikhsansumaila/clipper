services:
  n8n_clipper:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_clipper
    restart: always
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - nginx-proxy-manager-network

  discord-bridge:
    image: node:20-alpine
    container_name: discord_bridge
    restart: always
    env_file:
      - .env
    volumes:
      - ./discord-bridge:/app
    working_dir: /app
    command: sh -c "npm install discord.js axios && node discord-bridge.js"

  clipper-pipeline:
    build: ./pipeline
    container_name: clipper_pipeline
    restart: always
    user: "1000:1001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/home/ubuntu/clipper
    env_file:
      - .env
    working_dir: /home/ubuntu/clipper/pipeline/src

  clipper-results:
    build: ./results-server
    container_name: clipper_results
    restart: always
    ports:
      - "5680:5680"
    volumes:
      - ./data:/data:ro
    env_file:
      - .env
    networks:
      - nginx-proxy-manager-network

networks:
  nginx-proxy-manager-network:
    external: true
